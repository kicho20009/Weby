<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Octothorp Integrated Solutions</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts: Inter/Roboto for modern look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="login-overlay" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #0d1117;">
        <div style="background: #161b22; padding: 40px; border-radius: 8px; border: 1px solid #30363d; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 80%; max-width: 400px;">
            <h1 style="color: #4bd8d6; margin-bottom: 20px; font-weight: 900;">OCTOTHORP ACCESS</h1>
            <p style="color: #8b949e; margin-bottom: 20px;">Please provide your security key.</p>
            <input type="password" id="access-key-input" placeholder="Enter Access Key (OCTO-2026-PRO)" style="padding: 10px; width: 100%; box-sizing: border-box; margin-bottom: 20px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 4px; outline: none;">
            <br>
            <button onclick="window.attemptLogin()" style="background: #4bd8d6; color: #0d1117; border: none; padding: 12px 20px; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; transition: 0.2s;">UNLOCK DASHBOARD</button>
            <div id="login-error" style="color: #f85149; margin-top: 15px; display: none; font-weight: bold;">Invalid Access Key.</div>
        </div>
    </div>

    <div class="app-container" id="app-container" style="display:none;">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="brand-title">OCTOTHORP</h1>
                <h2 class="brand-subtitle">INTERGRATED SOLUTIONS</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-view="dashboard">dashboard</a>
                <a href="#" class="nav-item" data-view="main-panel">Main panel</a>
                <a href="#" class="nav-item" data-view="monitoring">MONITORING</a>
                <a href="#" class="nav-item" data-view="console">CONSOLE</a>
            </nav>
            <div style="position: absolute; bottom: 30px; left: 0; width: 100%; text-align: center;">
                <button onclick="window.logout()" style="background:transparent; color:#8b949e; border:1px solid #30363d; padding:8px 30px; border-radius:4px; cursor:pointer; font-weight:bold; transition: 0.2s;">Disconnect</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div class="page-title-pill" id="page-title">dashboard</div>
            </div>
            
            <!-- Dynamic View Container -->
            <div id="view-container" class="view-container">
                <!-- Content injected via JS -->
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/charts.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
